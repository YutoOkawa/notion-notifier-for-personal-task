apiVersion: v1
kind: ConfigMap
metadata:
  name: notion-notifier-config
  namespace: default
data:
  config.yaml: |
    server:
      port: 8080

    notion:
      api_token: "${NOTION_API_TOKEN}"
      database_id: "${NOTION_DATABASE_ID}"

    discord:
      webhook_url: "${DISCORD_WEBHOOK_URL}"

    notification:
      days_before: 3
      check_schedule: "0 9 * * *"  # 毎日 09:00 JST (JSTとして解釈される実装の場合)
