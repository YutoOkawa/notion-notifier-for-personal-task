version: '3'

vars:
  IMAGE_NAME: notion-notifier
  VERSION:
    sh: cat VERSION 2>/dev/null || echo "1.0.0"
  REGISTRY: "localhost:5005"
  FULL_IMAGE_NAME: "{{.IMAGE_NAME}}:{{.VERSION}}"
  REMOTE_IMAGE: "{{.REGISTRY}}/{{.FULL_IMAGE_NAME}}"

tasks:
  build:
    desc: Build the Docker image locally
    cmds:
      - echo "Building {{.FULL_IMAGE_NAME}}"
      - docker build -t {{.FULL_IMAGE_NAME}} .

  transfer:
    desc: Push image to the registry on Mac mini
    cmds:
      - echo "Tagging and pushing {{.REMOTE_IMAGE}}..."
      - docker tag {{.FULL_IMAGE_NAME}} {{.REMOTE_IMAGE}}
      - docker save {{.REMOTE_IMAGE}} | ssh mac-mini.local "docker load && docker push {{.REMOTE_IMAGE}}"

  apply:
    desc: Apply Kubernetes manifests
    cmds:
      - ./scripts/deploy_k8s.sh {{.VERSION}} {{.REMOTE_IMAGE}}

  deploy:
    cmds:
      - task: build
      - task: transfer
      - task: apply

  bump:patch:
    desc: Bump patch version (0.0.X)
    cmds:
      - ./scripts/bump_version.sh patch

  bump:minor:
    desc: Bump minor version (0.X.0)
    cmds:
      - ./scripts/bump_version.sh minor

  bump:major:
    desc: Bump major version (X.0.0)
    cmds:
      - ./scripts/bump_version.sh major
